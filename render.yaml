# Render Blueprint — Postgres + NestJS backend.
#
# Frontend deploys to Vercel (https://aitu-unilms.vercel.app), so this
# Blueprint only owns the long-running NestJS service + database.
#
# Usage:
#   1. https://dashboard.render.com → New → Blueprint
#   2. Connect this repo (branch `main` of the fork in use)
#   3. Apply
#   4. After services are created, fill in the `sync: false` env vars
#      in the backend service's Environment tab:
#        TELEGRAM_BOT_TOKEN, TELEGRAM_WEBHOOK_SECRET, LLM_API_KEY,
#        S3_ENDPOINT, S3_BUCKET, S3_ACCESS_KEY, S3_SECRET_KEY,
#        S3_PUBLIC_URL, BACKEND_PUBLIC_URL, FRONTEND_URL
#
# Free Postgres has a 90-day lifespan; upgrade to Starter ($7/mo) before
# expiry or migrate to Neon/Supabase. The free web service sleeps after
# 15 min of inactivity — the GitHub Actions keep-alive workflow in
# `.github/workflows/keep-alive.yml` pings /api/health every 10 minutes
# to keep it warm so the bot stays reachable.

databases:
  - name: aitu-unilms-db
    databaseName: unilms
    user: unilms
    plan: free
    region: frankfurt # closest to KZ/CIS

services:
  - type: web
    name: aitu-unilms-backend
    runtime: docker
    plan: free
    region: frankfurt
    rootDir: apps/backend
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    healthCheckPath: /api/health
    autoDeploy: true
    # `main` so this works for any fork; the active branch in
    # Nurislam841/relaxed-benz is main and we force-push the live code
    # there. (See DEPLOY-RENDER.md for the rationale.)
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: TELEGRAM_MODE
        value: webhook
      - key: TELEGRAM_BOT_USERNAME
        value: uni_lms_bot
      - key: STORAGE_MODE
        value: s3
      - key: S3_REGION
        value: auto
      - key: DATABASE_URL
        fromDatabase:
          name: aitu-unilms-db
          property: connectionString
      # Strong randoms — Render generates these once per service.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: TELEGRAM_LINK_SECRET
        generateValue: true
      # Telegram restricts secret_token to [A-Za-z0-9_-]; Render's
      # generateValue produces base64 (+/= chars) which Telegram rejects
      # with 400. Paste a hex string manually instead.
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      # Secrets you paste in the Render dashboard.
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
      # Public URLs — paste once known:
      #   BACKEND_PUBLIC_URL = https://aitu-unilms-backend.onrender.com
      #   FRONTEND_URL       = https://aitu-unilms.vercel.app
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
